apiVersion: v2
name: krateo-autopilot
description: Installs all Krateo Autopilot agents, MCP servers, model configs, and prompts
type: application
version: CHART_VERSION
appVersion: "0.1.0"
home: https://krateo.io
# SOURCE_REF is stamped to the release tag by release-oci, so the published chart's `sources`
# point at the exact released ref the orchestrator reads via the github MCP. (The chart `version`
# already tracks the release — it is CHART_VERSION, stamped from the tag.)
sources:
  - https://github.com/braghettos/krateo-autopilot/tree/SOURCE_REF
