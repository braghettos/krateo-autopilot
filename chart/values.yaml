namespace: krateo-system

# Human-in-the-loop approval gate for mutating Kubernetes tools (k8s_apply_manifest,
# k8s_patch_resource, k8s_delete_resource, k8s_scale, ...). true (default, safe): the
# k8s-agent and autopilot pause for approval before changing the cluster. false: they
# execute remediations autonomously (no approval) — use for closed-loop automation.
hitlApproval: true

# Gemini API key secret — must already exist in the namespace
geminiApiKey:
  secretName: gemini-api-key
  secretKey: apiKey

# Model configurations
models:
  flash:
    name: gemini-flash
    # gemini-3.5-flash GA'd in the Gemini API but is NOT available on Vertex (GeminiVertexAI) yet —
    # it 404s on Vertex (verified 2026-06 on integration-test-431120/us-central1). Hold at 2.5-flash
    # for the Vertex provider; bump to 3.5 only once Vertex lists it.
    model: gemini-2.5-flash
    provider: Gemini
  pro:
    name: gemini-pro
    # HOLD at 2.5-pro: gemini-3.5-pro is limited Vertex preview as of 2026-06 with no published
    # GA Vertex/Gemini-API model ID. Bump to gemini-3.5-pro once Google lists it.
    model: gemini-2.5-pro
    provider: Gemini

# Gemini Vertex AI provider config.
# When enabled, ModelConfigs use provider GeminiVertexAI with Application Default
# Credentials (no API key / no SA-key file) — the kagent agent pods authenticate to
# Vertex via the GKE node SA token from the metadata server. The node pool's SA must
# have an IAM role covering aiplatform.* (e.g. roles/aiplatform.user or roles/editor)
# and the node pool must run with the cloud-platform OAuth scope.
vertexAI:
  enabled: false
  projectID: ""
  # `global` is Google's recommended endpoint for Gemini 2.5 — routes across regions instead of
  # pinning one regional Dynamic Shared Quota pool (best availability / lowest 429 rate for the
  # agent fan-out). Override with a region if you need data residency.
  location: global
  # secretName is only used for explicit SA-key auth; left unset for ADC.
  secretName: ""

# Local LLM (Ollama) provider — opt-in. When enabled, every model slot above is rendered as
# a kagent ModelConfig with provider Ollama pointing at `host`, and the slot model id is
# overridden by `model` (so flash/pro both resolve to the local LLM). Takes precedence over
# vertexAI. Disabled by default — vertexAI / Gemini stays the default. Point `host` at an
# in-cluster Ollama Service (e.g. http://ollama.ollama.svc.cluster.local:11434) and use a
# tool-calling-capable model (the agents are tool-heavy): qwen3.6 is recommended; gemma4
# works but needs careful chat-template config; gemma <=3 cannot tool-call. See the installer
# QUICKSTART "Run the agent layer on a local model (Ollama)".
localModel:
  enabled: false
  host: ""
  model: qwen3.6

# MCP servers — these are RemoteMCPServer CRDs pointing to existing deployments
mcpServers:
  clickhouse:
    enabled: true
    url: http://clickhouse-mcp-server.krateo-system:8000/mcp
    protocol: STREAMABLE_HTTP
  github:
    enabled: true
    url: http://github-mcp-server.krateo-system:3000/mcp
    protocol: STREAMABLE_HTTP

# Agents — enable/disable individual agents
agents:
  autopilot:
    enabled: true
    modelConfig: gemini-flash
    # Optional kagent skill OCI image (skills-init pulls it anonymously, so it must be a
    # public registry). Empty by default — set to your own skill image if you have one.
    skillRef: ""
  k8s:
    enabled: true
    modelConfig: gemini-flash
  helm:
    enabled: true
    modelConfig: gemini-flash

# Prompts language
prompts:
  language: eng

# Extra A2A sub-agents to register on the orchestrator — component/blueprint-contributed
# specialists (e.g. the installer's krateo-installer-agent). The orchestrator stays the
# single mandatory entry point; these are reachable only through its routing. Each entry:
# name (required), optional kind (default Agent) and apiGroup (default kagent.dev). Unset =
# none. Example:
#   extraAgents:
#     - name: krateo-installer-agent
