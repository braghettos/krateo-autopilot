{{- /*
  ModelConfigs for the autopilot agents.

  localModel.enabled=true -> provider Ollama with the ollama.host block, pointing every
    model slot at a local Ollama endpoint (no cloud, no API key). The slot model id is
    overridden by localModel.model so flash/pro both resolve to the local LLM. Takes
    precedence over vertexAI — this is the opt-in "run the agents on a local LLM" path.

  localModel.enabled=false (default):
    vertexAI.enabled=true  -> provider GeminiVertexAI with the geminiVertexAI block
      (projectID + location). No apiKeySecret: kagent authenticates to Vertex via
      Application Default Credentials (the GKE node SA token from the metadata server).
    vertexAI.enabled=false -> provider Gemini with the apiKeySecret (Gemini API key).
*/}}
{{- range $alias, $m := .Values.models }}
apiVersion: kagent.dev/v1alpha2
kind: ModelConfig
metadata:
  name: {{ $m.name }}
  namespace: {{ $.Values.namespace }}
spec:
{{- if $.Values.localModel.enabled }}
  model: {{ $.Values.localModel.model }}
  provider: Ollama
  ollama:
    host: {{ $.Values.localModel.host | quote }}
{{- else if $.Values.vertexAI.enabled }}
  model: {{ $m.model }}
  provider: GeminiVertexAI
  geminiVertexAI:
    projectID: {{ $.Values.vertexAI.projectID | quote }}
    location: {{ $.Values.vertexAI.location | quote }}
    # Pinned low so investigation/RCA behaviour is consistent. Unset, Gemini defaults to ~1.0
    # (high) and the agents get erratic on ambiguous asks (an RCA sometimes investigated,
    # sometimes punted back as clarifying questions). Hardcoded — NOT a values field — because
    # the core-provider crdgen emits a schema `number` as a string and chokes on the value path.
    # MUST be a quoted STRING: the kagent ModelConfig CRD types geminiVertexAI.temperature as
    # `string` and rejects a bare number ("must be of type string").
    temperature: "0.3"
{{- else }}
  model: {{ $m.model }}
  provider: {{ $m.provider }}
  apiKeySecret: {{ $.Values.geminiApiKey.secretName }}
  apiKeySecretKey: {{ $.Values.geminiApiKey.secretKey }}
{{- end }}
---
{{- end }}
