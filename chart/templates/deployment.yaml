apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "autopilot.fullname" . }}
  labels:
    {{- include "autopilot.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "autopilot.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "autopilot.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "autopilot.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          envFrom:
            - configMapRef:
                name: {{ include "autopilot.fullname" . }}
          env: 
            {{- range $secret := .Values.envFromSecret }}
            - name: {{ $secret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secret.secretName }}
                  key: {{ $secret.key }}
                  {{- if hasKey $secret "optional" }}
                  optional: {{ $secret.optional }}
                  {{- end }}
            {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
            {{- range $i, $p := .Values.prompts }}
            - name: oci-{{ printf "%02d" $i }}-{{ $p.name | lower | replace " " "-" | regexReplaceAll "[^a-z0-9-]" "-" | trimAll "-" }}
              # Mount a single file directly under /prompts/<filename>
              mountPath: "/prompts/{{ default (printf "%s.md" $p.name) $p.filename }}"
              subPath: "{{ default (printf "%s.md" $p.name) $p.filename }}"
              readOnly: true
            {{- end }}
      volumes:
        {{- toYaml . | nindent 8 }}
        {{- range $i, $p := .Values.prompts }}
        - name: oci-{{ printf "%02d" $i }}-{{ $p.name | lower | replace " " "-" | regexReplaceAll "[^a-z0-9-]" "-" | trimAll "-" }}
          image:
            reference: "{{ $p.repository }}:{{ $p.version }}"
            pullPolicy: IfNotPresent
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
