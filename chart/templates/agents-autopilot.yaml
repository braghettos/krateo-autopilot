{{- if .Values.agents.autopilot.enabled }}
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: krateo-autopilot
  namespace: {{ .Values.namespace }}
spec:
  type: Declarative
  description: "Orchestrator for Krateo PlatformOps — routes user requests to the appropriate specialist sub-agent and installs Krateo"
{{- if .Values.agents.autopilot.skillRef }}
  skills:
    refs:
      - {{ .Values.agents.autopilot.skillRef }}
{{- end }}
  declarative:
    deployment:
      env:
{{- include "krateo-autopilot.genaiEnv" . | nindent 8 }}
    modelConfig: {{ .Values.agents.autopilot.modelConfig }}
    stream: true
    promptTemplate:
      dataSources:
        - kind: ConfigMap
          name: krateo-prompts-{{ .Values.prompts.language }}
          alias: prompts
    systemMessage: |
      {{`{{include "prompts/autopilot"}}`}}
    tools:
      - type: McpServer
        mcpServer:
          name: kagent-tool-server
          kind: RemoteMCPServer
          apiGroup: kagent.dev
{{- if .Values.hitlApproval }}
          requireApproval:
            - k8s_apply_manifest
{{- end }}
          toolNames:
            - k8s_apply_manifest
            - k8s_get_resources
      {{- if .Values.agents.k8s.enabled }}
      - type: Agent
        agent:
          name: k8s-agent
          kind: Agent
          apiGroup: kagent.dev
      {{- end }}
      {{- if .Values.agents.helm.enabled }}
      - type: Agent
        agent:
          name: helm-agent
          kind: Agent
          apiGroup: kagent.dev
      {{- end }}
      {{- /* extraAgents: blueprint-contributed specialists (a component or the installer ships
             its own Agent and registers it here). The orchestrator stays the single mandatory
             entry point; these are reachable only through this A2A routing. */}}
      {{- range .Values.extraAgents }}
      - type: Agent
        agent:
          name: {{ .name }}
          kind: {{ .kind | default "Agent" }}
          apiGroup: {{ .apiGroup | default "kagent.dev" }}
      {{- end }}
    context:
      compaction:
        compactionInterval: 5
        overlapSize: 1
        summarizer:
          modelConfig: {{ .Values.agents.autopilot.modelConfig }}
    a2aConfig:
      skills:
        - id: krateo-platform-ops
          name: Krateo Platform Operations
          description: "Full-stack AI assistant for Krateo PlatformOps"
          tags: [krateo, platform, kubernetes]
{{- end }}
