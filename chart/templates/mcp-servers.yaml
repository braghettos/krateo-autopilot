{{- if .Values.mcpServers.clickhouse.enabled }}
apiVersion: kagent.dev/v1alpha2
kind: RemoteMCPServer
metadata:
  name: clickhouse-mcp-server
  namespace: {{ .Values.namespace }}
spec:
  description: "ClickHouse OTel observability MCP server"
  protocol: {{ .Values.mcpServers.clickhouse.protocol }}
  url: {{ .Values.mcpServers.clickhouse.url }}
{{- end }}
{{- if .Values.mcpServers.github.enabled }}
---
apiVersion: kagent.dev/v1alpha2
kind: RemoteMCPServer
metadata:
  name: github-mcp-server
  namespace: {{ .Values.namespace }}
spec:
  description: "GitHub official MCP server — source code search, file contents, commits, PRs, repo management"
  protocol: {{ .Values.mcpServers.github.protocol }}
  url: {{ .Values.mcpServers.github.url }}
  {{- if .Values.mcpServers.github.authSecret }}
  # github-mcp-server's HTTP mode enforces per-request auth; inject the PAT as an
  # Authorization: Bearer header (the secret value already includes the "Bearer " prefix).
  headersFrom:
    - name: Authorization
      valueFrom:
        name: {{ .Values.mcpServers.github.authSecret }}
        key: {{ .Values.mcpServers.github.authSecretKey | default "authorization" }}
        type: Secret
  {{- end }}
{{- if .Values.mcpServers.github.deployWorkload }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: github-mcp-server
  namespace: {{ .Values.namespace }}
  labels:
    app: github-mcp-server
    app.kubernetes.io/name: github-mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: github-mcp-server
  template:
    metadata:
      labels:
        app: github-mcp-server
    spec:
      containers:
        - name: server
          image: {{ .Values.mcpServers.github.image | default "ghcr.io/github/github-mcp-server:v1.6.0" }}
          args: ["http", "--port", "{{ .Values.mcpServers.github.port | default 3000 }}", "--listen-host", "0.0.0.0"]
          ports:
            - containerPort: {{ .Values.mcpServers.github.port | default 3000 }}
              name: mcp
          env:
            - name: GITHUB_PERSONAL_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mcpServers.github.tokenSecret }}
                  key: {{ .Values.mcpServers.github.tokenSecretKey | default "token" }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.mcpServers.github.port | default 3000 }}
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: github-mcp-server
  namespace: {{ .Values.namespace }}
  labels:
    app: github-mcp-server
spec:
  selector:
    app: github-mcp-server
  ports:
    - port: {{ .Values.mcpServers.github.port | default 3000 }}
      targetPort: {{ .Values.mcpServers.github.port | default 3000 }}
      name: mcp
{{- end }}
{{- end }}
{{- if .Values.mcpServers.chartAuthoring.enabled }}
---
apiVersion: kagent.dev/v1alpha2
kind: RemoteMCPServer
metadata:
  name: chart-authoring-mcp
  namespace: {{ .Values.namespace }}
spec:
  description: "Krateo chart-authoring MCP — validate a drafted Helm chart via helm-render, generate its values.schema.json, and scaffold a blueprint skeleton"
  protocol: {{ .Values.mcpServers.chartAuthoring.protocol }}
  url: {{ .Values.mcpServers.chartAuthoring.url }}
{{- if .Values.mcpServers.chartAuthoring.deployWorkload }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chart-authoring-mcp
  namespace: {{ .Values.namespace }}
  labels:
    app: chart-authoring-mcp
    app.kubernetes.io/name: chart-authoring-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chart-authoring-mcp
  template:
    metadata:
      labels:
        app: chart-authoring-mcp
    spec:
      containers:
        - name: server
          image: {{ .Values.mcpServers.chartAuthoring.image }}
          ports:
            - containerPort: {{ .Values.mcpServers.chartAuthoring.port | default 8085 }}
              name: mcp
          env:
            - name: PORT
              value: "{{ .Values.mcpServers.chartAuthoring.port | default 8085 }}"
            # The chart-authoring MCP validates a drafted chart by rendering it through the
            # in-cluster helm-render-service (same renderer the previewBlueprint drawer uses),
            # so "validate_chart ok" == "the preview will render".
            - name: HELM_RENDER_URL
              value: {{ .Values.mcpServers.chartAuthoring.helmRenderUrl | default "http://krateo-helm-render-service.krateo-system.svc:8080" }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.mcpServers.chartAuthoring.port | default 8085 }}
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: chart-authoring-mcp
  namespace: {{ .Values.namespace }}
  labels:
    app: chart-authoring-mcp
spec:
  selector:
    app: chart-authoring-mcp
  ports:
    - port: {{ .Values.mcpServers.chartAuthoring.port | default 8085 }}
      targetPort: {{ .Values.mcpServers.chartAuthoring.port | default 8085 }}
      name: mcp
{{- end }}
{{- end }}
