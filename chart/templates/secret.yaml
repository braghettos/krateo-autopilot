{{- if .Values.database.enabled -}}
{{- $secret := lookup "v1" "Secret" .Release.Namespace (include "autopilot.dbSecretName" .) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "autopilot.dbSecretName" . }}
  labels:
    {{- include "autopilot.labels" . | nindent 4 }}
type: kubernetes.io/basic-auth
stringData:
  username: {{ include "autopilot.fullname" . }}
  {{- if $secret }}
  password: {{ $secret.data.password | b64dec }}
  {{- else }}
  password: {{ randAlphaNum 16 }}
  {{- end }}
{{- end }}