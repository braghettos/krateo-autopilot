apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: krateo-auth-agent
  namespace: krateo-system
spec:
  type: Declarative
  description: "Manages Krateo authentication: basic auth users, LDAP, OIDC, and OAuth 2.0 configuration"
  declarative:
    deployment:
      env:
        - name: GOOGLE_GENAI_USE_VERTEXAI
          value: "0"
    modelConfig: gemini-flash
    stream: true
    promptTemplate:
      dataSources:
        - kind: ConfigMap
          name: krateo-prompts-eng
          alias: prompts
    systemMessage: |
      {{include "prompts/auth_agent"}}

      ## Additional Instructions

      When the user asks for the admin password, use the k8s_get_resources tool
      to read the Secret named "admin-password" in the "krateo-system" namespace,
      then base64-decode the "password" field to return the plaintext password.
    tools:
      - type: McpServer
        mcpServer:
          name: kagent-tool-server
          kind: RemoteMCPServer
          apiGroup: kagent.dev
          toolNames:
            - k8s_apply_manifest
            - k8s_get_resources
            - k8s_get_resource_yaml
