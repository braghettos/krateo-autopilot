apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: krateo-tf-provider-to-operator-agent
  namespace: krateo-system
spec:
  type: Declarative
  description: "Translates Terraform providers into Kubernetes operators, or recommends existing operators (ACK, Config Connector, ASO, Crossplane)"
  declarative:
    deployment:
      env:
        - name: GOOGLE_GENAI_USE_VERTEXAI
          value: "0"
    modelConfig: gemini-pro
    stream: true
    a2aConfig:
      skills:
        - id: terraform-provider-to-operator
          name: "Terraform Provider to Kubernetes Operator"
          description: "Maps Terraform provider resources to existing K8s operators (ACK, Config Connector, ASO, Crossplane) or generates new operator CRDs and controllers"
          tags:
            - terraform
            - operator
            - kubernetes
            - crossplane
            - code-generation
    promptTemplate:
      dataSources:
        - kind: ConfigMap
          name: krateo-prompts-eng
          alias: prompts
    systemMessage: |
      {{include "prompts/tf_provider_to_operator_agent"}}
    tools:
      - type: McpServer
        mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: github-mcp-server
          toolNames:
            - get_file_contents
            - get_repository_tree
            - search_code
            - search_repositories
      - type: McpServer
        mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: kagent-tool-server
          toolNames:
            - k8s_get_available_api_resources
            - k8s_get_resources
