apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: krateo-autopilot
  namespace: krateo-system
spec:
  type: Declarative
  description: "Orchestrator for Krateo PlatformOps — routes user requests to the
    appropriate specialist sub-agent and installs Krateo"
  skills:
    refs:
      - gcr.io/neon-481711/krateo-install-skill:latest
  declarative:
    deployment:
      env:
        - name: GOOGLE_GENAI_USE_VERTEXAI
          value: "0"
    modelConfig: gemini-flash
    stream: true
    promptTemplate:
      dataSources:
        - kind: ConfigMap
          name: krateo-prompts-eng
          alias: prompts
    systemMessage: |
      {{include "prompts/autopilot"}}
    tools:
      - type: McpServer
        mcpServer:
          name: kagent-tool-server
          kind: RemoteMCPServer
          apiGroup: kagent.dev
          toolNames:
            - k8s_apply_manifest
            - k8s_get_resources
      - type: Agent
        agent:
          name: krateo-auth-agent
          kind: Agent
          apiGroup: kagent.dev
      - type: Agent
        agent:
          name: krateo-blueprint-agent
          kind: Agent
          apiGroup: kagent.dev
      - type: Agent
        agent:
          name: krateo-documentation-agent
          kind: Agent
          apiGroup: kagent.dev
      - type: Agent
        agent:
          name: krateo-portal-agent
          kind: Agent
          apiGroup: kagent.dev
      - type: Agent
        agent:
          name: krateo-restaction-agent
          kind: Agent
          apiGroup: kagent.dev
      - type: Agent
        agent:
          name: krateo-observability-agent
          kind: Agent
          apiGroup: kagent.dev
      - type: Agent
        agent:
          name: k8s-agent
          kind: Agent
          apiGroup: kagent.dev
      - type: Agent
        agent:
          name: helm-agent
          kind: Agent
          apiGroup: kagent.dev
      - type: Agent
        agent:
          name: krateo-code-analysis-agent
          kind: Agent
          apiGroup: kagent.dev
      - type: Agent
        agent:
          name: krateo-ansible-to-operator-agent
          kind: Agent
          apiGroup: kagent.dev
      - type: Agent
        agent:
          name: krateo-tf-provider-to-operator-agent
          kind: Agent
          apiGroup: kagent.dev
      - type: Agent
        agent:
          name: krateo-tf-to-helm-agent
          kind: Agent
          apiGroup: kagent.dev
    context:
      compaction:
        compactionInterval: 5
        overlapSize: 1
        summarizer:
          modelConfig: gemini-flash
    a2aConfig:
      skills:
        - id: krateo-platform-ops
          name: Krateo Platform Operations
          description: "Full-stack AI assistant for Krateo PlatformOps — manages blueprints,
            portal, authentication, RESTActions, and provides Krateo documentation"
          tags:
            - krateo
            - platform
            - kubernetes
