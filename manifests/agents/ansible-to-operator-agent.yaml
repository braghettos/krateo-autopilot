apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: krateo-ansible-to-operator-agent
  namespace: krateo-system
spec:
  type: Declarative
  description: "Translates Ansible playbooks and roles into Kubernetes operators using the Operator SDK Ansible Operator path"
  declarative:
    deployment:
      env:
        - name: GOOGLE_GENAI_USE_VERTEXAI
          value: "0"
    modelConfig: gemini-pro
    stream: true
    a2aConfig:
      skills:
        - id: ansible-to-operator
          name: "Ansible to Kubernetes Operator"
          description: "Converts Ansible playbooks/roles into Operator SDK Ansible-based operators with CRDs, watches.yaml, and role structure"
          tags:
            - ansible
            - operator-sdk
            - kubernetes
            - code-generation
    promptTemplate:
      dataSources:
        - kind: ConfigMap
          name: krateo-prompts-eng
          alias: prompts
    systemMessage: |
      {{include "prompts/ansible_to_operator_agent"}}
    tools:
      - type: McpServer
        mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: github-mcp-server
          toolNames:
            - get_file_contents
            - get_repository_tree
            - search_code
            - search_repositories
