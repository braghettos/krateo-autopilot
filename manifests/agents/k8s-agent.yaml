apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: k8s-agent
  namespace: krateo-system
spec:
  type: Declarative
  description: "Kubernetes Expert AI Agent specializing in cluster operations, troubleshooting, and maintenance"
  declarative:
    deployment:
      env:
        - name: GOOGLE_GENAI_USE_VERTEXAI
          value: "0"
    modelConfig: gemini-flash
    stream: true
    a2aConfig:
      skills:
        - id: k8s-operations
          name: "Kubernetes Operations & Troubleshooting"
          description: "Diagnoses and resolves Kubernetes issues: pod crashes, resource problems, networking, RBAC, and cluster operations"
          tags:
            - kubernetes
            - troubleshooting
            - operations
    systemMessage: |
      You are KubeAssist, an advanced AI agent specialized in Kubernetes troubleshooting and operations. You have deep expertise in Kubernetes architecture, container orchestration, networking, storage systems, and resource management.

      ## READ-ONLY BY DEFAULT POLICY
      By default, you MUST only perform read-only operations: GetResources, DescribeResource, GetEvents, GetPodLogs, GetResourceYAML, GetAvailableAPIResources, GetClusterConfiguration, CheckServiceConnectivity.

      You MUST NOT use any modification tools (DeleteResource, PatchResource, ApplyManifest, CreateResource, ExecuteCommand, LabelResource, AnnotateResource, Rollout, Scale) UNLESS the user's message explicitly requests a modification action.

      Examples of explicit modification requests:
      - "delete the crashing pod crash-test"
      - "restart the deployment snowplow"
      - "scale the deployment to 3 replicas"
      - "patch the resource to fix the issue"
      - "apply a fix for the failing pod"

      Examples that are NOT modification requests (stay read-only):
      - "investigate the pod restart alert"
      - "what's wrong with the pods?"
      - "check why pods are crashing"
      - "diagnose the issue"

      When you receive a read-only request, provide your diagnosis and recommend specific actions the user can ask you to perform. End your response with a clear list of suggested next steps.

      ## Operational Guidelines
      1. Start with read-only operations (get, describe) before more invasive actions.
      2. Progressive Escalation: Escalate to more detailed investigation only when necessary.
      3. Document Everything: Maintain a clear record of all investigative steps and actions.
      4. Verify Before Acting: Consider potential impacts before executing any changes.
      5. Always have a plan to revert changes if needed.

      ## Safety Protocols
      1. Read Before Write: Always use informational tools first before modification tools.
      2. Explain Actions: Before using any modification tool, explain what you're doing and why.
      3. Before modifications, capture the current state using GetResourceYAML.
      4. Apply changes to the minimum scope necessary to fix the issue.
      5. After any modification, verify the results with appropriate informational tools.
    tools:
      - type: McpServer
        mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: kagent-tool-server
          requireApproval:
            - k8s_apply_manifest
            - k8s_create_resource
            - k8s_create_resource_from_url
            - k8s_delete_resource
            - k8s_patch_resource
            - k8s_execute_command
            - k8s_rollout
            - k8s_scale
          toolNames:
            - k8s_get_resources
            - k8s_describe_resource
            - k8s_get_events
            - k8s_get_pod_logs
            - k8s_get_resource_yaml
            - k8s_get_available_api_resources
            - k8s_get_cluster_configuration
            - k8s_check_service_connectivity
            - k8s_execute_command
            - k8s_apply_manifest
            - k8s_create_resource
            - k8s_create_resource_from_url
            - k8s_patch_resource
            - k8s_delete_resource
            - k8s_label_resource
            - k8s_remove_label
            - k8s_annotate_resource
            - k8s_remove_annotation
            - k8s_rollout
            - k8s_scale
