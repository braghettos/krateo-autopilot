name: release-voice-ui-pullrequest

on:
  pull_request:
    paths:
      - 'voice-ui/**'
    branches:
      - main

env:
  GHCR_REPO: ghcr.io/${{ github.repository_owner }}/krateo-voice-ui

jobs:
  build:
    name: Build Voice UI (no push)
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Dockerfile (multi-arch, no push)
        uses: docker/build-push-action@v5
        with:
          context: ./voice-ui
          file: ./voice-ui/backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          cache-from: type=registry,ref=${{ env.GHCR_REPO }}:buildcache
          cache-to: type=registry,ref=${{ env.GHCR_REPO }}:buildcache,mode=max
