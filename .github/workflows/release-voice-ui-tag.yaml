name: release-voice-ui-tag

on:
  push:
    tags:
      - 'voice-ui/[0-9]+.[0-9]+.[0-9]+'

env:
  GHCR_REPO: ghcr.io/${{ github.repository_owner }}/krateo-voice-ui

jobs:
  build:
    name: Build and Push Voice UI
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#voice-ui/}" >> "$GITHUB_OUTPUT"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_REPO }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: ./voice-ui
          file: ./voice-ui/backend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          provenance: false
          cache-from: type=registry,ref=${{ env.GHCR_REPO }}:buildcache
          cache-to: type=registry,ref=${{ env.GHCR_REPO }}:buildcache,mode=max

      - name: Inspect image
        run: |
          FIRST_TAG=$(echo '${{ steps.meta.outputs.json }}' | jq -r '.tags[0]')
          docker buildx imagetools inspect "$FIRST_TAG"
