name: release-mcp-server-tag

on:
  push:
    tags:
      - 'blueprint-tools/[0-9]+.[0-9]+.[0-9]+'
      - 'portal-tools/[0-9]+.[0-9]+.[0-9]+'

jobs:
  build:
    name: Build and Push MCP Server
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse component and version from tag
        id: parse
        run: |
          TAG="${GITHUB_REF_NAME}"
          COMPONENT="${TAG%/*}"
          VERSION="${TAG##*/}"
          echo "component=${COMPONENT}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/krateo-${{ steps.parse.outputs.component }}
          tags: |
            type=raw,value=${{ steps.parse.outputs.version }}
            type=raw,value=latest

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: ./mcp-servers/${{ steps.parse.outputs.component }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          provenance: false
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/krateo-${{ steps.parse.outputs.component }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/krateo-${{ steps.parse.outputs.component }}:buildcache,mode=max

      - name: Inspect image
        run: |
          FIRST_TAG=$(echo '${{ steps.meta.outputs.json }}' | jq -r '.tags[0]')
          docker buildx imagetools inspect "$FIRST_TAG"
