name: release-mcp-server-pullrequest

on:
  pull_request:
    paths:
      - 'mcp-servers/**'
    branches:
      - main

jobs:
  detect:
    name: Detect changed MCP servers
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.changes.outputs.matrix }}
      has_changes: ${{ steps.changes.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find changed MCP servers
        id: changes
        run: |
          set -euo pipefail
          COMPONENTS=()
          for dir in mcp-servers/*/; do
            name="$(basename "$dir")"
            if [[ -f "${dir}Dockerfile" ]]; then
              COMPONENTS+=("$name")
            fi
          done

          if (( ${#COMPONENTS[@]} == 0 )); then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
          else
            JSON=$(printf '%s\n' "${COMPONENTS[@]}" | jq -R -s 'split("\n")[:-1] | map({component: .})')
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "matrix={\"include\":$JSON}" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build ${{ matrix.component }}
    needs: detect
    if: needs.detect.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect.outputs.matrix) }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./mcp-servers/${{ matrix.component }}
          platforms: linux/amd64,linux/arm64
          push: false
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/krateo-${{ matrix.component }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/krateo-${{ matrix.component }}:buildcache,mode=max
