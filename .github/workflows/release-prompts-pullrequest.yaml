name: release-prompts-pullrequest

on:
  pull_request:
    # paths:
    #   - "prompts/**/*.md"
    branches:
      - main

jobs:
  plan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read   # needed to list tags from GHCR (no writes)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ORAS
        uses: oras-project/setup-oras@v1

      - name: Login to GHCR (read-only)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build matrix of .md files
        id: mk
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob globstar
          files=(prompts/**/*.md)

          # Build JSON array of file paths (properly quoted)
          if (( ${#files[@]} == 0 )); then
            files_json='[]'
            has_files=false
          else
            files_json=$(printf '%s\n' "${files[@]}" | jq -R -s 'split("\n")[:-1]')
            has_files=true
          fi

          # Build matrix: {"include":[{"file":"..."}]}
          echo '{}' | jq --argjson files "$files_json" \
            '.include = ($files | map({file: .}))' > matrix.json

          # ✅ Outputs (use multiline format for JSON)
          echo "has_files=${has_files}" >> "$GITHUB_OUTPUT"
          {
            echo "matrix<<__MATRIX__"
            cat matrix.json
            echo "__MATRIX__"
          } >> "$GITHUB_OUTPUT"

          # Logs
          echo "Detected files: ${#files[@]}"
          echo "Matrix content:"
          cat matrix.json

          # Summary
          {
            echo "### Markdown file matrix"
            echo
            echo "\`${#files[@]}\` markdown files found."
            echo
            echo '```json'
            cat matrix.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"


  prepare_each:
    needs: plan
    if: ${{ needs.plan.outputs.has_files == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read   # needed for oras repo tags
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ORAS
        uses: oras-project/setup-oras@v1
        with:
          version: latest

      - name: Login to GHCR (read-only)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create local OCI manifest & determine version (no push)
        id: prep
        shell: bash
        env:
          FILE: ${{ matrix.file }}
          REPO: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          set -euo pipefail

          NAME="$(basename "$FILE")"
          STEM="${NAME%.*}"
          SAFE_NAME="$(echo "$STEM" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g;s/^-+|-+$//g')"

          IMAGE_REPO="ghcr.io/${REPO}/${SAFE_NAME}"
          GIT_SHA="$(git rev-parse --short=12 HEAD)"
          CONTENT_SHA="$(sha256sum "$FILE" | cut -c1-12)"

          mkdir -p "prepared/${SAFE_NAME}"

          # --- Determine VERSION from existing tags (fallback 0.0.1) ---
          # Fetch tags; allow failure if repo doesn't exist yet.
          TAGS_RAW="$(oras repo tags "${IMAGE_REPO}" 2>/dev/null || true)"

          # Extract semver tags (supports '1.2.3' and 'v1.2.3')
          # Normalize by stripping a leading 'v' for comparison.
          mapfile -t SEMVER_TAGS < <(printf '%s\n' "${TAGS_RAW}" \
            | grep -E '^(v)?[0-9]+\.[0-9]+\.[0-9]+$' || true)

          if (( ${#SEMVER_TAGS[@]} > 0 )); then
            # Produce "normalized version|original" lines, sort by normalized, pick highest.
            BEST_LINE="$(
              for t in "${SEMVER_TAGS[@]}"; do
                norm="${t#v}"
                printf '%s|%s\n' "$norm" "$t"
              done | sort -t'|' -k1,1V | tail -n1
            )"
            NORMALIZED="${BEST_LINE%%|*}"
            VERSION="$NORMALIZED"
          else
            VERSION="0.0.1"
          fi

          # --- Create a local manifest representing what we'd push ---
          oras manifest create \
            --artifact-type text/markdown \
            --config /dev/null:application/vnd.unknown.config.v1+json \
            --annotation "org.opencontainers.image.title=${NAME}" \
            --annotation "org.opencontainers.image.description=Markdown prompt artifact for ${STEM}" \
            --annotation "org.opencontainers.image.source=${SERVER_URL}/${REPO}" \
            --annotation "org.opencontainers.image.revision=${{ github.sha }}" \
            --annotation "org.opencontainers.image.version=${VERSION}" \
            --annotation "org.opencontainers.image.licenses=Apache-2.0" \
            --output "prepared/${SAFE_NAME}/manifest.json" \
            "$FILE:text/markdown"

          # Nothing is uploaded; just summarize the plan.
          {
            echo "### Plan for \`${FILE}\`"
            echo ""
            echo "- Image: \`${IMAGE_REPO}\`"
            echo "- Planned tags: \`${GIT_SHA}\`, \`content-${CONTENT_SHA}\`, \`latest\`, \`${VERSION}\`"
            echo "- Version source: $( [[ ${VERSION} == 0.0.1 ]] && echo 'no prior version found → default 0.0.1' || echo 'detected from existing tags' )"
            echo "- Manifest (first 80 chars):"
            head -c 80 "prepared/${SAFE_NAME}/manifest.json" | sed 's/$/.../'; echo
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"