name: release-chart-pullrequest

on:
  pull_request:
    paths:
      - "chart/**"
    branches:
      - main

jobs:
  install-kind:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        k8s_version: [ "v1.32.8", "v1.33.4" ]

    steps:
      - name: Authenticate with GitHub App
        id: authenticate
        uses: tibdex/github-app-token@v1
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # we need tags history

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Compute latest tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force

          # latest autopilot like "autopilot/2.6.0"
          latest_autopilot="$(
            git tag -l 'autopilot/*' --sort=-version:refname \
            | head -n1 || true
          )"

          # latest chart like "chart/2.6.0"
          latest_chart="$(
            git tag -l 'chart/*' --sort=-version:refname \
            | head -n1 || true
          )"

          # fallbacks
          latest_autopilot="${latest_autopilot:-autopilot/0.0.1}"
          latest_chart="${latest_chart:-chart/0.0.1}"

          # strip the prefix to get just the version
          latest_autopilot="${latest_autopilot#autopilot/}"
          latest_chart="${latest_chart#chart/}"

          {
            echo "latest_autopilot=$latest_autopilot"
            echo "latest_chart=$latest_chart"
          } >> "$GITHUB_OUTPUT"

      - name: Echo
        run: |
          echo "APP_VERSION=${{ steps.tags.outputs.latest_autopilot }}"
          echo "CHART_VERSION=${{ steps.tags.outputs.latest_chart }}"

      - name: Replace CHART_VERSION in chart/Chart.yaml
        run: sed -i 's/CHART_VERSION/${{ steps.tags.outputs.latest_chart }}/g' ./chart/Chart.yaml

      - name: Replace APP_VERSION in Chart.yaml
        run: sed -i 's/APP_VERSION/${{ steps.tags.outputs.latest_autopilot }}/g' ./chart/Chart.yaml

      - name: Set up Helm
        uses: azure/setup-helm@v4.1.0

      - name: Helm lint chart
        run: helm lint ./chart

      - name: Create k8s Kind Cluster
        uses: helm/kind-action@v1
        with:
          node_image: kindest/node:${{ matrix.k8s_version }}

      - name: Create key.json from GitHub secret
        run: |
          echo "${{ secrets.GCLOUD_CREDENTIALS }}" > key.json

      - name: Create krateo-system namespace
        run: |
          kubectl create namespace krateo-system

      - name: Create Kubernetes secret
        run: |
          kubectl create secret generic gcloud-credentials \
            --from-file=key.json=key.json \
            --namespace krateo-system

      - name: Create GHCR pull secret
        run: |
          kubectl -n krateo-system create secret docker-registry ghcr-pull-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --docker-email=krateoctl@krateo.io \
          || kubectl -n krateo-system get secret ghcr-pull-secret -o name

      - name: Install chart with standard configuration
        run: helm install autopilot ./chart --create-namespace -n krateo-system --wait

      - name: Wait for deployment to become ready
        run: kubectl wait deployment autopilot --for condition=Ready=True --timeout=120s --namespace krateo-system

      - name: Get deployments
        if: always()
        run: kubectl get deployment autopilot -n krateo-system -o yaml

      - name: Get pods
        if: always()
        run: kubectl get pods -n krateo-system

      - name: Get pod logs
        if: always()
        run: kubectl logs -n krateo-system -l app=autopilot

      - name: Get events
        if: always()
        run: kubectl get events -A --sort-by='.lastTimestamp'