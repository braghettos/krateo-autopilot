name: release-chart-pullrequest

on:
  pull_request:
    paths:
      - 'mcp-servers/*/chart/**'
      - 'voice-ui/chart/**'
    branches:
      - main

jobs:
  lint:
    name: Lint Helm Charts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4.1.0

      - name: Lint all charts
        run: |
          set -euo pipefail
          EXIT=0
          for chart_dir in mcp-servers/*/chart voice-ui/chart; do
            if [[ -f "${chart_dir}/Chart.yaml" ]]; then
              echo "Linting ${chart_dir}..."
              helm lint "./${chart_dir}" || EXIT=1
            fi
          done
          exit $EXIT
