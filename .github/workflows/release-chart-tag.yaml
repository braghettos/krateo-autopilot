name: release-chart-tag

on:
  push:
    tags:
      - 'chart/blueprint-tools/[0-9]+.[0-9]+.[0-9]+'
      - 'chart/portal-tools/[0-9]+.[0-9]+.[0-9]+'
      - 'chart/voice-ui/[0-9]+.[0-9]+.[0-9]+'

jobs:
  publish:
    name: Publish Helm Chart
    runs-on: ubuntu-latest

    steps:
      - name: Authenticate with GitHub App
        id: authenticate
        uses: tibdex/github-app-token@v1
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.PRIVATE_KEY }}

      - uses: actions/checkout@v4

      - name: Parse component and version from tag
        id: parse
        run: |
          TAG="${GITHUB_REF_NAME}"         # chart/voice-ui/0.1.0
          STRIPPED="${TAG#chart/}"          # voice-ui/0.1.0
          COMPONENT="${STRIPPED%/*}"        # voice-ui
          VERSION="${STRIPPED##*/}"         # 0.1.0
          echo "component=${COMPONENT}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Determine chart path
        id: path
        run: |
          COMPONENT="${{ steps.parse.outputs.component }}"
          if [[ "$COMPONENT" == "voice-ui" ]]; then
            echo "chart_dir=voice-ui/chart" >> "$GITHUB_OUTPUT"
          else
            echo "chart_dir=mcp-servers/${COMPONENT}/chart" >> "$GITHUB_OUTPUT"
          fi

      - name: Set version in Chart.yaml
        run: |
          sed -i "s/^version:.*/version: ${{ steps.parse.outputs.version }}/" "${{ steps.path.outputs.chart_dir }}/Chart.yaml"

      - name: Set up Helm
        uses: azure/setup-helm@v4.1.0

      - name: Helm lint chart
        run: helm lint "./${{ steps.path.outputs.chart_dir }}"

      - name: Prepare charts_dir
        run: |
          mkdir -p _chart
          cp -R "${{ steps.path.outputs.chart_dir }}" "_chart/"

      - name: Publish Helm chart
        uses: stefanprodan/helm-gh-pages@master
        with:
          token: ${{ steps.authenticate.outputs.token }}
          charts_dir: _chart
          charts_url: https://charts.krateo.io
          owner: krateoplatformops
          repository: helm-charts
          branch: gh-pages
