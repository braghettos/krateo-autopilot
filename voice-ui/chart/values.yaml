replicaCount: 1

image:
  repository: gcr.io/neon-481711/krateo-voice-ui
  tag: v0.1.0
  pullPolicy: IfNotPresent

service:
  type: LoadBalancer
  port: 8080

# Reference to an existing Secret containing the Gemini API key
geminiApiKeySecret:
  name: gemini-api-key
  key: apiKey

# A2A endpoint for the Krateo Autopilot agent
a2aEndpoint: "http://kagent-controller.krateo-system.svc.cluster.local:8083/api/a2a/krateo-system/krateo-autopilot/"

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
