<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Krateo Autopilot — Voice</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>Krateo Autopilot</h1>
      <span id="status" class="status disconnected">Disconnected</span>
    </header>

    <div id="transcript">
      <div id="transcript-log"></div>
    </div>

    <div id="suggestions">
      <button class="suggestion">What's the Krateo status?</button>
      <button class="suggestion">List all helm releases</button>
      <button class="suggestion">Check pod health in krateo-system</button>
      <button class="suggestion">What blueprints are available?</button>
    </div>

    <div id="controls">
      <canvas id="waveform" width="300" height="60"></canvas>
      <button id="mic-btn" disabled>
        <svg id="mic-icon" viewBox="0 0 24 24" width="32" height="32" fill="currentColor">
          <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
        <svg id="stop-icon" viewBox="0 0 24 24" width="28" height="28" fill="currentColor" style="display:none">
          <rect x="6" y="6" width="12" height="12" rx="2"/>
        </svg>
      </button>
      <p id="mic-label">Tap to speak</p>
      <p id="hint"></p>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
